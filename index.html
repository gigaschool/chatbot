<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gemini Local Chatbot MVP</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="settingsOverlay" class="settings-overlay" hidden></div>
    <main class="app-shell">
      <aside id="settingsPanel" class="settings-panel" aria-label="設定">
        <div class="brand-block">
          <div>
            <h1>Gemini Chat</h1>
            <p>Model: <strong>gemini-flash-latest</strong></p>
          </div>
          <button id="closeSettingsButton" class="icon-button close-settings" type="button" aria-label="設定を閉じる">×</button>
        </div>

        <form id="settingsForm" class="settings-form">
          <label class="field">
            <span>Gemini API キー</span>
            <input id="apiKeyInput" type="password" autocomplete="off" placeholder="AIza..." required>
          </label>

          <label class="field">
            <span>カスタムインストラクション</span>
            <textarea id="instructionInput" rows="8" placeholder="例: あなたは日本語で簡潔に回答するアシスタントです。"></textarea>
          </label>

          <div class="button-row">
            <button class="primary-button" type="submit">保存</button>
            <button id="toggleKeyButton" class="secondary-button" type="button">表示</button>
          </div>
        </form>

        <section class="storage-note" aria-label="保存について">
          <h2>保存先</h2>
          <p>API キー、カスタムインストラクション、会話履歴、送受信ログはこのブラウザの localStorage に保存されます。</p>
        </section>

        <button id="exportLogButton" class="secondary-button wide-button" type="button">ログを書き出し</button>

        <div class="danger-zone">
          <button id="clearChatButton" class="secondary-button" type="button">会話を消去</button>
          <button id="clearAllButton" class="danger-button" type="button">全データ削除</button>
        </div>
      </aside>

      <section class="chat-panel" aria-label="チャット">
        <header class="chat-header">
          <button id="openSettingsButton" class="icon-button menu-button" type="button" aria-label="設定を開く" aria-controls="settingsPanel" aria-expanded="false">☰</button>
          <div>
            <h2>チャット</h2>
            <p id="statusText">未送信</p>
          </div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="composer">
          <label class="sr-only" for="messageInput">メッセージ</label>
          <textarea id="messageInput" rows="3" placeholder="メッセージを入力..." required></textarea>
          <button id="sendButton" class="primary-button" type="submit">送信</button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
